services:
  backend:
    build: ./backend
    # Reads DATABASE_URL (your Supabase pooler URL) and any AI keys from backend/.env.
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000/api
    environment:
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
